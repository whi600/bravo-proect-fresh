<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000" role="img" aria-label="BR logo">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#2F302A" flood-opacity="0.12"/>
    </filter>
    <filter id="limewash" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="8" result="noise"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.956  0 0 0 0 0.937  0 0 0 0 0.902  0 0 0 .20 0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <linearGradient id="accentGrad" x1="180" y1="220" x2="820" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B86645" stop-opacity=".96"/>
      <stop offset="1" stop-color="#8F5A3C" stop-opacity=".94"/>
    </linearGradient>
  </defs>

  <!-- transparent outer canvas for flexible website use -->
  <g filter="url(#softShadow)">
    <!-- soft architectural arch, inspired by interior studio / lime plaster -->
    <path d="M250 825 L250 410 C250 245 365 145 500 145 C635 145 750 245 750 410 L750 825 Z" fill="#F4EFE6" filter="url(#limewash)"/>
    <path d="M250 825 L250 410 C250 245 365 145 500 145 C635 145 750 245 750 410 L750 825 Z" fill="none" stroke="#6F7558" stroke-width="18" stroke-linejoin="round" opacity=".92"/>
  </g>

  <!-- organic clay/terracotta accent, not a construction cliché -->
  <path d="M266 661 C354 619 455 647 552 607 C628 575 695 501 754 528 C812 554 798 676 715 734 C620 799 468 808 348 778 C270 758 217 704 266 661 Z" fill="url(#accentGrad)" opacity=".22"/>

  <!-- thin spatula-like handwork lines -->
  <path d="M316 294 C407 267 489 268 585 293" fill="none" stroke="#8F5A3C" stroke-width="8" stroke-linecap="round" opacity=".42"/>
  <path d="M383 764 C468 786 558 786 639 762" fill="none" stroke="#6F7558" stroke-width="7" stroke-linecap="round" opacity=".36"/>

  <!-- BR monogram as true vector outlines -->
  <path d="M386.05,448.59 Q386.05,424.17 375.51,413.36 Q364.96,402.48 340.80,402.48 L311.77,402.48 L311.77,499.85 L342.47,499.85 Q364.76,499.85 375.37,488.17 Q386.05,476.49 386.05,448.59 Z M407.07,577.66 Q407.07,549.90 393.19,536.35 Q379.38,522.80 347.88,522.80 L311.77,522.80 L311.77,636.25 Q341.80,637.52 359.16,637.52 Q383.51,637.52 395.26,622.71 Q407.07,607.89 407.07,577.66 Z M210.00,659.21 L210.00,644.00 L246.10,638.32 L246.10,400.21 L210.00,394.74 L210.00,379.52 L345.81,379.52 Q401.47,379.52 427.96,394.47 Q454.46,409.35 454.46,442.72 Q454.46,467.75 438.77,485.90 Q423.16,504.05 396.86,509.66 Q435.90,513.66 455.92,530.88 Q475.94,548.03 475.94,577.66 Q475.94,618.30 445.91,639.39 Q415.88,660.48 359.76,660.48 L264.66,659.21 L210.00,659.21 Z M596.85,540.76 L596.85,638.32 L632.76,644.00 L632.76,659.21 L497.82,659.21 L497.82,644.00 L530.99,638.32 L530.99,400.21 L495.08,394.74 L495.08,379.52 L628.82,379.52 Q690.55,379.52 720.98,398.54 Q751.42,417.49 751.42,457.73 Q751.42,517.80 695.09,534.88 L769.77,638.32 L800.00,644.00 L800.00,659.21 L709.51,659.21 L631.49,540.76 L596.85,540.76 Z M686.35,458.14 Q686.35,426.90 673.40,414.69 Q660.52,402.48 626.08,402.48 L596.85,402.48 L596.85,517.80 L627.15,517.80 Q659.25,517.80 672.80,504.45 Q686.35,491.10 686.35,458.14 Z" fill="#2F302A"/>

  <!-- discreet terracotta inner mark, gives identity/accent without rough tools -->
  <path d="M502 686 C522 656 541 628 560 597" fill="none" stroke="#B86645" stroke-width="16" stroke-linecap="round" opacity=".96"/>
  <circle cx="716" cy="294" r="16" fill="#B86645" opacity=".92"/>
</svg>